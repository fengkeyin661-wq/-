    <!-- 使用国内访问更快的 Tailwind CDN 或者建议本地构建，此处保留 CDN 方便演示 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* 使用系统字体栈，移除 Google Fonts 以加速国内访问 */
      body {
        font-family: "PingFang SC", "Microsoft YaHei", "Heiti SC", system-ui, -apple-system, sans-serif;
        background-color: #f8fafc;
      }
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }

      /* Print Styles */
      @media print {
        @page {
          margin: 15mm;
          size: A4;
        }
        body {
          background-color: white !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        /* Hide UI Chrome */
        aside, header, .no-print {
          display: none !important;
        }
        /* Reset Layout */
        #root, .flex, .h-screen, main {
          display: block !important;
          height: auto !important;
          width: 100% !important;
          overflow: visible !important;
          position: static !important;
        }
        main {
          padding: 0 !important;
          margin: 0 !important;
        }
        /* Hide scrollbars */
        ::-webkit-scrollbar {
          display: none;
        }
        /* Page break utilities */
        .break-inside-avoid {
          break-inside: avoid;
        }
        .page-break {
          page-break-before: always;
        }
      }
    </style>
