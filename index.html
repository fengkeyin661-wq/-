
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>郑州大学医院健康管理中心 | Health Management Center</title>
    <!-- 使用 Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "PingFang SC", "Microsoft YaHei", "Heiti SC", system-ui, -apple-system, sans-serif;
        background-color: #f8fafc;
      }
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

      @keyframes voiceWave {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(2.5); }
      }
      .animate-voice-wave { animation: voiceWave 0.6s infinite ease-in-out; }

      @keyframes pulseSlow {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
      }
      .animate-pulse-slow { animation: pulseSlow 3s infinite ease-in-out; }

      @media print {
        @page { margin: 15mm; size: A4; }
        body { background-color: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        aside, header, .no-print { display: none !important; }
        #root, .flex, .h-screen, main { display: block !important; height: auto !important; width: 100% !important; overflow: visible !important; position: static !important; }
        main { padding: 0 !important; margin: 0 !important; }
        .break-inside-avoid { break-inside: avoid; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "pdfjs-dist": "https://aistudiocdn.com/pdfjs-dist@^5.4.449",

    "react": "https://aistudiocdn.com/react@^19.2.1",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.2",
    "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@^2.86.2",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "mammoth": "https://aistudiocdn.com/mammoth@^1.11.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0"
  }
}
</script>
</head>
